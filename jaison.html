<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <p class="tagline">IT IS NOT GOOD THAT THE MAN SHOULD BE ALONE; I WILL MAKE HIM AN HELP MEET FOR HIM..</p>
        </header>

        <div class="day-badge">
            <span class="days-val" id="days-large">00</span>
            <div class="to-go-wrap">

            <div class="time-box">
                <span id="hours">00</span>

            <div class="time-box">
                <span id="minutes">00</span>
                <p>MINUTES</p>
            </div>
            <span class="divider">:</span>
            <div class="time-box">
                <span id="seconds">00</span>

            </div>

        <button class="invitation-btn">
